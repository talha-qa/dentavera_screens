<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif}
.app{display:grid;grid-template-columns:220px 1fr;min-height:740px;background:#f4f6fb}
.sb{background:#040e22;padding:0;display:flex;flex-direction:column}
.sb-top{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-box{width:28px;height:28px;background:#2563ff;border-radius:7px;display:flex;align-items:center;justify-content:center}
.sb-box i{color:#fff;font-size:13px}
.sb-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.sb-org{font-size:10px;color:rgba(255,255,255,0.28);margin-top:1px}
.sb-nav{padding:14px 10px;flex:1}
.sb-sec{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:14px 10px 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,0.42);font-size:12px;margin-bottom:1px}
.sb-item i{font-size:15px;flex-shrink:0}
.sb-item.on{background:rgba(37,99,255,0.16);color:#fff}
.sb-item.on i{color:#5b8fff}
.sb-bot{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;background:rgba(37,99,255,0.28);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#7aaeff;flex-shrink:0}
.sb-un{font-size:11px;font-weight:500;color:#fff}
.sb-ur{font-size:10px;color:rgba(255,255,255,0.28)}
.main{padding:28px 28px;overflow:auto}
.pg-eyebrow{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#2563ff;margin-bottom:6px}
.pg-title{font-size:22px;font-weight:600;color:#040e22;letter-spacing:-0.5px}
.pg-sub{font-size:12px;color:#94a3b8;margin-top:3px;margin-bottom:26px}
.preview-strip{background:#fff;border-radius:12px;border:1px solid #eaeff8;padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;gap:14px}
.prev-thumb{width:52px;height:52px;border-radius:8px;background:#eaeff8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prev-thumb i{font-size:22px;color:#c4cdd8}
.prev-info .prev-t{font-size:12px;font-weight:500;color:#040e22}
.prev-info .prev-s{font-size:10px;color:#94a3b8;margin-top:2px}
.btn-change{margin-left:auto;background:none;border:1px solid #eaeff8;border-radius:7px;padding:5px 12px;font-size:10px;color:#64748b;font-family:'Inter',sans-serif;cursor:pointer}
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sim-btn{background:#fff;border:2px solid #eaeff8;border-radius:12px;padding:20px 16px;cursor:pointer;text-align:left;transition:border-color 0.15s,box-shadow 0.15s;font-family:'Inter',sans-serif}
.sim-btn:hover{border-color:#2563ff;box-shadow:0 0 0 3px rgba(37,99,255,0.06)}
.sim-btn.selected{border-color:#2563ff;box-shadow:0 0 0 3px rgba(37,99,255,0.08)}
.sim-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sim-ico i{font-size:17px}
.ic1{background:#eff4ff} .ic1 i{color:#2563ff}
.ic2{background:#effaf4} .ic2 i{color:#16a34a}
.ic3{background:#f5f3ff} .ic3 i{color:#7c3aed}
.ic4{background:#fff8ec} .ic4 i{color:#d97706}
.ic5{background:#fef2f2} .ic5 i{color:#dc2626}
.ic6{background:#f4f6fb} .ic6 i{color:#64748b}
.sim-t{font-size:13px;font-weight:600;color:#040e22;margin-bottom:3px}
.sim-s{font-size:10px;color:#94a3b8;line-height:1.5}
.btn-run{width:100%;margin-top:22px;height:48px;background:#2563ff;border:none;border-radius:11px;color:#fff;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-run i{font-size:16px}
</style>
<div class="app">
  <div class="sb">
    <div class="sb-top"><div class="sb-brand"><div class="sb-box"><i class="ti ti-scan" aria-hidden="true"></i></div><div><div class="sb-name">Dentavera</div><div class="sb-org">AcmeCorp Dental</div></div></div></div>
    <div class="sb-nav">
      <div class="sb-sec">Workspace</div>
      <div class="sb-item"><i class="ti ti-layout-dashboard" aria-hidden="true"></i>Dashboard</div>
      <div class="sb-item on"><i class="ti ti-brain" aria-hidden="true"></i>New simulation</div>
      <div class="sb-item"><i class="ti ti-history" aria-hidden="true"></i>My simulations</div>
      <div class="sb-item"><i class="ti ti-user" aria-hidden="true"></i>Profile</div>
    </div>
    <div class="sb-bot"><div class="sb-av">JD</div><div><div class="sb-un">Jane Doe</div><div class="sb-ur">Standard user</div></div></div>
  </div>
  <div class="main">
    <div class="pg-eyebrow">Screen 4 — User</div>
    <div class="pg-title">Select simulation</div>
    <div class="pg-sub">Choose a treatment type to visualize</div>
    <div class="preview-strip">
      <div class="prev-thumb"><i class="ti ti-photo" aria-hidden="true"></i></div>
      <div class="prev-info"><div class="prev-t">patient_smile_01.jpg</div><div class="prev-s">Uploaded · 2.4 MB · Ready</div></div>
      <button class="btn-change">Change image</button>
    </div>
    <div class="sim-grid">
      <button class="sim-btn selected">
        <div class="sim-ico ic1"><i class="ti ti-sparkles" aria-hidden="true"></i></div>
        <div class="sim-t">Whitening</div>
        <div class="sim-s">Brighten and even tooth shade for a whiter smile</div>
      </button>
      <button class="sim-btn">
        <div class="sim-ico ic2"><i class="ti ti-heart" aria-hidden="true"></i></div>
        <div class="sim-t">Healthy Gums</div>
        <div class="sim-s">Visualize improved gum health and colour</div>
      </button>
      <button class="sim-btn">
        <div class="sim-ico ic3"><i class="ti ti-tools" aria-hidden="true"></i></div>
        <div class="sim-t">Restoration</div>
        <div class="sim-s">Repair chipped, broken or missing teeth</div>
      </button>
      <button class="sim-btn">
        <div class="sim-ico ic4"><i class="ti ti-arrows-horizontal" aria-hidden="true"></i></div>
        <div class="sim-t">Alignment</div>
        <div class="sim-s">Straighten teeth and correct spacing issues</div>
      </button>
      <button class="sim-btn">
        <div class="sim-ico ic5"><i class="ti ti-rotate" aria-hidden="true"></i></div>
        <div class="sim-t">Wear from Grinding</div>
        <div class="sim-s">Show effects of occlusal wear over time</div>
      </button>
      <button class="sim-btn">
        <div class="sim-ico ic6"><i class="ti ti-clock" aria-hidden="true"></i></div>
        <div class="sim-t">No Treatment</div>
        <div class="sim-s">Progression without intervention over time</div>
      </button>
    </div>
    <button class="btn-run"><i class="ti ti-player-play" aria-hidden="true"></i>Run simulation</button>
  </div>
</div>
